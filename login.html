<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vayne Ventures | Secure Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Syncopate:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-red: #D71212;
            --bg-black: #050505;
            --surface: #0a0a0a;
            --text-white: #EDEDED;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: radial-gradient(circle at center, rgba(215, 18, 18, 0.05) 0%, transparent 70%);
        }

        .login-card {
            background: var(--surface);
            padding: 3rem;
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .brand-logo {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 4px;
            color: var(--primary-red);
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .input-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            color: var(--primary-red);
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 0.75rem 1rem;
            color: white;
            border-radius: 4px;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--primary-red);
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-login {
            width: 100%;
            background: var(--primary-red);
            color: black;
            border: none;
            padding: 1rem;
            font-family: 'Syncopate', sans-serif;
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 1rem;
            transition: all 0.3s;
        }

        .btn-login:hover {
            background: #ff1e1e;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(215, 18, 18, 0.3);
        }

        .error-msg {
            color: #ff4444;
            font-size: 0.8rem;
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="brand-logo">VAYNE VENTURES</div>
        <h1>Consultant Portal Access</h1>

        <form id="login-form">
            <div class="input-group">
                <label>Access Key</label>
                <input type="text" id="username" required autocomplete="off">
            </div>
            <div class="input-group">
                <label>Security Token</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn-login">AUTHORIZE</button>
            <div id="error" class="error-msg">Authorization Failed. Invalid Credentials.</div>
        </form>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const err = document.getElementById('error');

            // Simple client-side check for static demonstration
            // Usually this would be replaced by a proper backend auth flow
            if (u === 'vayne' && p === 'ventures2026') {
                sessionStorage.setItem('vayne_auth', 'true');
                window.location.href = 'invoice_template.html';
            } else {
                err.style.display = 'block';
                setTimeout(() => { err.style.display = 'none'; }, 3000);
            }
        });
    </script>
</body>

</html>
