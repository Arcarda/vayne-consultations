<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <meta name="description" content="Establishing the Sovereign Will. Coming Soon.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Aesthetic Palette (Crimson Covenant Inspired) */
            --crimson: #DC143C;
            --crimson-glow: rgba(220, 20, 60, 0.4);
            --black: #030303;
            --text-main: #EFEFEF;
            --text-muted: #8A8A8A;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--black);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(220, 20, 60, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 50% 100%, rgba(74, 0, 0, 0.15) 0%, transparent 60%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
            position: relative;
        }

        .content {
            position: relative;
            z-index: 10;
            max-width: 800px;
            width: 90%;
            padding: 2rem;
            animation: fadeIn 2s ease-out;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(3rem, 12vw, 6rem);
            font-weight: 900;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            color: #fff;
            text-shadow: 0 0 30px rgba(220, 20, 60, 0.3);
        }

        .status {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            letter-spacing: 0.5em;
            color: var(--text-muted);
            margin-bottom: 4rem;
            text-transform: uppercase;
            font-weight: 400;
            opacity: 0.8;
        }

        .tagline {
            font-size: 1rem;
            color: var(--text-muted);
            letter-spacing: 0.15em;
            font-weight: 300;
            line-height: 2;
            max-width: 450px;
            margin: 0 auto;
            text-transform: uppercase;
            opacity: 0.6;
        }

        /* Ambient Glow animation */
        body::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 80vw;
            height: 80vw;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, var(--crimson-glow) 0%, transparent 70%);
            z-index: 1;
            opacity: 0.3;
            animation: breathe 10s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.2; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.4; transform: translate(-50%, -50%) scale(1.1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            position: absolute;
            bottom: 3rem;
            z-index: 10;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            letter-spacing: 0.4em;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; letter-spacing: 0.1em; }
            .status { font-size: 1.1rem; letter-spacing: 0.3em; }
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>Coming Soon</h1>
        <div class="status">Implementation in Progress</div>
        
        <p class="tagline">
            Forging the Sovereign Will. <br>
            Ex nihilo Oriri.
        </p>
    </div>

    <footer>
        &bull; MMXXVI &bull;
    </footer>

</body>
</html>
