<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAYNE - Promo Projector Loop</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600&family=Share+Tech+Mono&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050508;
            --text-main: #ffffff;
            --accent-red: #e31c1c;
            --accent-white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100vw; 
            height: 100vh; 
            overflow: hidden;
            background-color: var(--bg-dark);
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Background Texture Handling */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('wings_bg.png');
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            opacity: 0.6;
            z-index: 0;
            scale: var(--wing-scale, 1.0);
            filter: saturate(var(--wing-saturate, 1)) brightness(var(--wing-brightness, 1)) sepia(var(--wing-sepia, 0)) hue-rotate(var(--wing-hue, 0deg));
            animation: pulse-bg 15s infinite alternate ease-in-out;
            transform-origin: center;
        }

        @keyframes pulse-bg {
            0% { opacity: 0.4; }
            100% { opacity: 0.7; }
        }

        /* Main Container */
        .promo-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        /* Large Glitch Title */
        .glitch-title {
            font-family: 'Syncopate', sans-serif;
            font-size: 16vw; /* Slightly larger since it's a shorter word */
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5vw;
            color: var(--text-main);
            position: relative;
            text-shadow: 0 0 2vw rgba(227, 28, 28, 0.5);
            margin-bottom: 6vh;
            text-align: center;
            display: inline-block;
        }

        .glitch-title::before,
        .glitch-title::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            color: #fff;
            -webkit-text-stroke: 0px;
            opacity: 0.8;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .glitch-title::before {
            left: 5px;
            text-shadow: -4px 0 var(--sync-red, var(--accent-red));
            animation: glitch-anim-1 2s infinite linear alternate-reverse;
        }

        .glitch-title::after {
            left: -5px;
            text-shadow: 4px 0 var(--sync-white, rgba(255,255,255,0.6));
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim-1 {
            0% { clip-path: inset(20% 0 80% 0); }
            20% { clip-path: inset(60% 0 10% 0); }
            40% { clip-path: inset(40% 0 50% 0); }
            60% { clip-path: inset(80% 0 5% 0); }
            80% { clip-path: inset(10% 0 70% 0); }
            100% { clip-path: inset(30% 0 20% 0); }
        }

        @keyframes glitch-anim-2 {
            0% { clip-path: inset(10% 0 60% 0); }
            20% { clip-path: inset(80% 0 5% 0); }
            40% { clip-path: inset(30% 0 20% 0); }
            60% { clip-path: inset(50% 0 40% 0); }
            80% { clip-path: inset(5% 0 80% 0); }
            100% { clip-path: inset(70% 0 10% 0); }
        }

        /* Audio Sync Controls */
        .audio-controls {
            position: fixed;
            bottom: 2vh;
            right: 2vw;
            display: flex;
            gap: 1rem;
            z-index: 100;
        }

        .audio-controls .glass-pill {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--accent-red);
            border-radius: 4px;
            color: var(--accent-red);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.6rem; 
            letter-spacing: 1px;
            padding: 0.4rem 0.8rem;
            box-shadow: inset 0 0 10px rgba(227, 28, 28, 0.1);
            transition: all 0.3s ease;
            opacity: 0.5; /* Dim them out by default */
        }
        
        .audio-controls:hover .glass-pill {
            opacity: 1; /* Brighten on hover for setup */
        }

        .audio-controls .indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transition: all 0.3s;
        }

        .audio-controls .glass-pill.active .indicator {
            background: var(--accent-red);
            box-shadow: 0 0 10px var(--accent-red);
        }

        .audio-controls .glass-pill.active {
            background: rgba(227, 28, 28, 0.15);
            box-shadow: inset 0 0 15px rgba(227, 28, 28, 0.2), 0 0 10px rgba(227, 28, 28, 0.3);
            color: #fff;
        }

        /* Large Spectrogram */
        .spectrogram {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 0.8vw;
            height: 15vh;
            width: 80vw;
            opacity: 0.9;
        }

        .spectrogram .bar {
            width: 1.2vw;
            background: var(--accent-red);
            height: 2vh;
            border-radius: 2px;
            box-shadow: 0 0 1vw rgba(227, 28, 28, 0.6);
            animation: eq-play 1.5s infinite ease-in-out alternate;
            opacity: 0.8;
        }

        /* Extended bars for wider screen filling */
        .spectrogram .bar.b1 { animation-duration: 1.2s; animation-delay: 0.1s; }
        .spectrogram .bar.b2 { animation-duration: 0.8s; animation-delay: 0.3s; }
        .spectrogram .bar.b3 { animation-duration: 1.5s; animation-delay: 0.5s; }
        .spectrogram .bar.b4 { animation-duration: 1.1s; animation-delay: 0.2s; }
        .spectrogram .bar.b5 { animation-duration: 0.9s; animation-delay: 0.6s; }
        .spectrogram .bar.b6 { animation-duration: 1.4s; animation-delay: 0.4s; }
        .spectrogram .bar.b7 { animation-duration: 1.3s; animation-delay: 0.7s; }
        .spectrogram .bar.b8 { animation-duration: 0.7s; animation-delay: 0.2s; }
        .spectrogram .bar.b9 { animation-duration: 1.0s; animation-delay: 0.5s; }
        .spectrogram .bar.b10 { animation-duration: 1.2s; animation-delay: 0.8s; }
        .spectrogram .bar.b11 { animation-duration: 0.8s; animation-delay: 0.1s; }
        .spectrogram .bar.b12 { animation-duration: 1.6s; animation-delay: 0.4s; }
        .spectrogram .bar.b13 { animation-duration: 0.9s; animation-delay: 0.2s; }
        .spectrogram .bar.b14 { animation-duration: 1.1s; animation-delay: 0.6s; }
        .spectrogram .bar.b15 { animation-duration: 1.4s; animation-delay: 0.3s; }
        .spectrogram .bar.b16 { animation-duration: 0.8s; animation-delay: 0.5s; }
        .spectrogram .bar.b17 { animation-duration: 1.3s; animation-delay: 0.1s; }
        .spectrogram .bar.b18 { animation-duration: 0.9s; animation-delay: 0.7s; }
        .spectrogram .bar.b19 { animation-duration: 1.5s; animation-delay: 0.2s; }
        .spectrogram .bar.b20 { animation-duration: 1.1s; animation-delay: 0.8s; }
        .spectrogram .bar.b21 { animation-duration: 0.8s; animation-delay: 0.4s; }
        .spectrogram .bar.b22 { animation-duration: 1.4s; animation-delay: 0.1s; }
        .spectrogram .bar.b23 { animation-duration: 1.0s; animation-delay: 0.6s; }
        .spectrogram .bar.b24 { animation-duration: 1.2s; animation-delay: 0.3s; }
        .spectrogram .bar.b25 { animation-duration: 0.7s; animation-delay: 0.5s; }
        .spectrogram .bar.b26 { animation-duration: 1.1s; animation-delay: 0.8s; }
        .spectrogram .bar.b27 { animation-duration: 1.5s; animation-delay: 0.2s; }
        .spectrogram .bar.b28 { animation-duration: 0.9s; animation-delay: 0.4s; }
        .spectrogram .bar.b29 { animation-duration: 1.3s; animation-delay: 0.6s; }
        .spectrogram .bar.b30 { animation-duration: 1.0s; animation-delay: 0.1s; }

        @keyframes eq-play {
            0% { height: 2vh; background: var(--accent-red); }
            50% { background: var(--accent-white); box-shadow: 0 0 2vw rgba(255, 255, 255, 0.8); }
            100% { height: 15vh; background: var(--accent-red); }
        }

        /* Scanline Overlay */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 8px;
            pointer-events: none;
            z-index: 10;
            opacity: 0.3;
        }

    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="scanlines"></div>

    <div class="promo-container">
        <h1 class="glitch-title" data-text="VAYNE">VAYNE</h1>
        
        <div class="audio-controls">
            <button id="btn-mic" class="glass-pill" title="Sync with Microphone"><span class="indicator"></span> MIC SYNC</button>
            <button id="btn-sys" class="glass-pill" title="Sync with System Audio"><span class="indicator"></span> SYS SYNC</button>
        </div>
        
        <div class="spectrogram">
            <div class="bar b1"></div><div class="bar b2"></div><div class="bar b3"></div><div class="bar b4"></div>
            <div class="bar b5"></div><div class="bar b6"></div><div class="bar b7"></div><div class="bar b8"></div>
            <div class="bar b9"></div><div class="bar b10"></div><div class="bar b11"></div><div class="bar b12"></div>
            <div class="bar b13"></div><div class="bar b14"></div><div class="bar b15"></div><div class="bar b16"></div>
            <div class="bar b17"></div><div class="bar b18"></div><div class="bar b19"></div><div class="bar b20"></div>
            <div class="bar b21"></div><div class="bar b22"></div><div class="bar b23"></div><div class="bar b24"></div>
            <div class="bar b25"></div><div class="bar b26"></div><div class="bar b27"></div><div class="bar b28"></div>
            <div class="bar b29"></div><div class="bar b30"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- Audio Sync Logic (Web Audio API) ---
            const btnMic = document.getElementById('btn-mic');
            const btnSys = document.getElementById('btn-sys');
            const bars = document.querySelectorAll('.spectrogram .bar');
            const glitchTitle = document.querySelector('.glitch-title'); 
            const bgLayer = document.querySelector('.bg-layer');
            
            let audioContext;
            let analyser;
            let dataArray;
            let source;
            let animationFrame;
            let activeMode = null; 

            async function initAudio(mode) {
                if (activeMode === mode) {
                    stopAudio();
                    return;
                }

                stopAudio(); 
                
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    analyser = audioContext.createAnalyser();
                    analyser.fftSize = 64; 
                    
                    let stream;
                    if (mode === 'mic') {
                        stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                    } else if (mode === 'sys') {
                        stream = await navigator.mediaDevices.getDisplayMedia({ 
                            video: true,
                            audio: {
                                echoCancellation: false,
                                noiseSuppression: false,
                                autoGainControl: false
                            } 
                        });
                    }

                    source = audioContext.createMediaStreamSource(stream);
                    source.connect(analyser);

                    dataArray = new Uint8Array(analyser.frequencyBinCount);
                    activeMode = mode;
                    
                    bars.forEach(bar => {
                        bar.style.animation = 'none';
                    });

                    updateUI();
                    renderFrame();

                    if (stream) {
                        stream.getTracks().forEach(track => {
                            track.onended = () => stopAudio();
                        });
                    }

                } catch (err) {
                    console.error('Audio sync initialization failed or rejected:', err);
                    stopAudio();
                }
            }

            function stopAudio() {
                if (animationFrame) cancelAnimationFrame(animationFrame);
                if (source) source.disconnect();
                if (audioContext && audioContext.state !== 'closed') audioContext.close();
                activeMode = null;
                updateUI();
                
                bars.forEach(bar => {
                    bar.style.animation = '';
                    bar.style.height = ''; 
                    bar.style.background = '';
                    bar.style.boxShadow = '';
                });
                
                if(glitchTitle) {
                    glitchTitle.style.transform = '';
                    glitchTitle.style.textShadow = '';
                    glitchTitle.style.setProperty('--sync-red', 'var(--accent-red)');
                    glitchTitle.style.setProperty('--sync-white', 'rgba(255,255,255,0.6)');
                }
                
                if (bgLayer) {
                    bgLayer.style.setProperty('--wing-scale', '1');
                    bgLayer.style.setProperty('--wing-saturate', '1');
                    bgLayer.style.setProperty('--wing-brightness', '1');
                    bgLayer.style.setProperty('--wing-sepia', '0');
                    bgLayer.style.setProperty('--wing-hue', '0deg');
                }
            }

            function updateUI() {
                if (!btnMic || !btnSys) return;
                
                btnMic.classList.remove('active');
                btnSys.classList.remove('active');

                if (activeMode === 'mic') {
                    btnMic.classList.add('active');
                } else if (activeMode === 'sys') {
                    btnSys.classList.add('active');
                }
            }

            function renderFrame() {
                if (!activeMode) return;
                animationFrame = requestAnimationFrame(renderFrame);
                
                analyser.getByteFrequencyData(dataArray);
                
                let sum = 0;
                for (let i = 0; i < dataArray.length; i++) {
                    sum += dataArray[i];
                }
                const avgAmp = sum / dataArray.length;
                const normalizedAmp = avgAmp / 255; 

                // 1. Sync Spectrogram Bars
                for (let i = 0; i < bars.length; i++) {
                    let bIndex = Math.floor(i * (dataArray.length / bars.length)); 
                    if(bIndex >= dataArray.length) bIndex = dataArray.length - 1;
                    
                    const value = dataArray[bIndex];
                    const percent = value / 255;
                    
                    const minHeight = 2; 
                    const maxHeight = 15;
                    const height = minHeight + (percent * maxHeight);
                    
                    bars[i].style.height = `${height}vh`;

                    if (percent > 0.6) {
                        // High amplitude glows bright white
                        bars[i].style.background = '#ffffff';
                        bars[i].style.boxShadow = `0 0 ${1 + (percent * 1.5)}vw rgba(255, 255, 255, ${percent})`;
                    } else {
                        // Lower amplitude base glow Vayne red
                        bars[i].style.background = 'var(--accent-red)';
                        bars[i].style.boxShadow = `0 0 ${0.5 + (percent * 1)}vw rgba(227, 28, 28, ${0.4 + percent * 0.4})`;
                    }
                }
                
                // 2. Sync Glitch Title "Breathing"
                if (glitchTitle) {
                    const scale = 1 + (normalizedAmp * 0.04); // Slightly more rigid scaling for corporate
                    glitchTitle.style.transform = `scale(${scale})`;
                    
                    const coreGlow = 1 + (normalizedAmp * 2); 
                    glitchTitle.style.textShadow = `0 0 ${coreGlow}vw rgba(227, 28, 28, ${0.5 + (normalizedAmp * 0.5)})`;
                    
                    if (normalizedAmp > 0.4) {
                        // High energy: colors get extremely saturated/bright red
                        glitchTitle.style.setProperty('--sync-red', '#ff4d4d');
                        glitchTitle.style.setProperty('--sync-white', '#ffffff');
                    } else {
                        // Low energy: back to normal
                        glitchTitle.style.setProperty('--sync-red', 'var(--accent-red)');
                        glitchTitle.style.setProperty('--sync-white', 'rgba(255,255,255,0.6)');
                    }
                }

                // 3. Sync Background Wings Breathing + Flaming
                if (bgLayer) {
                    const wingScale = 1 + (normalizedAmp * 0.1); 
                    bgLayer.style.setProperty('--wing-scale', wingScale);
                    
                    if (normalizedAmp > 0.4) {
                        bgLayer.style.setProperty('--wing-sepia', '0.8');
                        bgLayer.style.setProperty('--wing-hue', '-50deg');
                        bgLayer.style.setProperty('--wing-saturate', 1 + (normalizedAmp * 3));
                        bgLayer.style.setProperty('--wing-brightness', 0.8 + (normalizedAmp * 0.5));
                    } else {
                        bgLayer.style.setProperty('--wing-sepia', '0');
                        bgLayer.style.setProperty('--wing-hue', '0deg');
                        bgLayer.style.setProperty('--wing-saturate', '1');
                        bgLayer.style.setProperty('--wing-brightness', '1');
                    }
                }
            }

            if(btnMic) btnMic.addEventListener('click', () => initAudio('mic'));
            if(btnSys) btnSys.addEventListener('click', () => initAudio('sys'));
        });
    </script>
</body>
</html>
